<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center; 
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
}
    .calculadora {
         background: #392114;
        padding: 20px;
         border-radius: 10px;
        text-align: center;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
}
     #visor {
        width: 100%;
        height: 50px;
        font-size: 1.8em;
        text-align: right;
        padding: 10px;
        background: #543221;
        color: #ffffff;
        border: none;
        margin-bottom: 10px;
}
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
}
        button {
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4d2c1e;
            color: white;
}

        button:hover {
            background: #5e4123;
}

.operador { background: #844223; }
.operador:hover { background: #9e4f2b; }

.igual { background: #718622; }
.igual:hover { background: #93931f; }

.limpar { background: #c24633; }
.limpar:hover { background: #ca563c; }
    </style>
</head>
<body>
    <div class="calculadora">

    <input type="text" id="visor" disabled>

    <div class="botoes">

    <button onclick="adicionar('7')">7</button>
    <button onclick="adicionar('8')">8</button>
    <button onclick="adicionar('9')">9</button>
    <button class="operador" onclick="adicionar('/')">/</button>

    <button onclick="adicionar('4')">4</button>
    <button onclick="adicionar('5')">5</button>
    <button onclick="adicionar('6')">6</button>
    <button class="operador" onclick="adicionar('*')">*</button>

    <button onclick="adicionar('1')">1</button>
    <button onclick="adicionar('2')">2</button>
    <button onclick="adicionar('3')">3</button>
    <button class="operador" onclick="adicionar('-')">-</button>

    <button onclick="adicionar('0')">0</button>
    <button onclick="adicionar('.')">.</button>
    <button class="igual" onclick="calcular()">=</button>
    <button class="operador" onclick="adicionar('+')">+</button>

    <button class="limpar" onclick="limpar()">C</button>

    </div>
</div>
<script>
function adicionar(valor) {
    document.getElementById('visor').value += valor;
}
function calcular() {
try {
document.getElementById('visor').value =
eval(document.getElementById('visor').value);
} catch {
        document.getElementById('visor').value = 'Erro';
    }
}
function limpar() {
document.getElementById('visor').value = '';
}
</script>
</body>
</html>
